<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Martin's Dashboard</title>
<style>
:root {
  color-scheme: light;
  --bg:#F7F6F3;--surface:#FFFFFF;--surface-2:#FAFAF8;--border:#E4E1D8;
  --t1:#18170E;--t2:#615E56;--t3:#9A9790;--t4:#C5C2BA;
  --green:#1A7A4F;--green-l:#E6F4EC;--orange:#C44B1C;--orange-l:#FEF1EB;
  --blue:#2952CC;--blue-l:#EAF0FD;--red:#C13030;
  --r:10px;
  --f:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
  --fm:ui-monospace,"SF Mono","Fira Code",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg)}
body{font-family:var(--f);color:var(--t1);font-size:14px;line-height:1.5;padding:24px 16px 100px;max-width:660px;margin:0 auto;-webkit-font-smoothing:antialiased}
.mono{font-family:var(--fm);font-variant-numeric:tabular-nums}
.label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.greeting{font-size:22px;font-weight:700;letter-spacing:-.4px;color:var(--t1)}
.date-str{font-size:13px;color:var(--t3);margin-top:1px}
.race-card{background:var(--t1);color:#fff;border-radius:var(--r);padding:20px;margin-bottom:24px;position:relative;overflow:hidden}
.race-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04)}
.race-card::after{content:'';position:absolute;bottom:-60px;left:-20px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.03)}
.race-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:1}
.race-num{font-family:var(--fm);font-size:52px;font-weight:800;line-height:1;letter-spacing:-2px}
.race-num-label{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px}
.race-right{text-align:right}
.race-event{font-size:15px;font-weight:700}
.race-date{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.race-bar-wrap{margin-top:16px;position:relative;z-index:1}
.race-bar-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px}
.race-bar{height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.race-bar-fill{height:100%;background:rgba(255,255,255,.75);border-radius:2px;transition:width .8s ease}
.race-chips{display:flex;gap:8px;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap}
.race-chip{font-size:11px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-radius:6px;padding:4px 10px}
.sec{margin-bottom:20px}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)}
.badge{font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;line-height:1.6}
.badge-green{background:var(--green);color:#fff}
.badge-orange{background:var(--orange);color:#fff}
.badge-blue{background:var(--blue);color:#fff}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border)}
.wo-meta{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.wo-eyebrow{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.wo-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.wo-title{font-size:22px;font-weight:700;letter-spacing:-.3px;line-height:1.15}
.wo-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;border-radius:6px;padding:3px 9px;margin-top:6px}
.wo-stats{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.wo-stat-num{font-family:var(--fm);font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1}
.wo-stat-lbl{font-size:11px;color:var(--t3)}
.wo-bar-wrap{padding:0 18px 16px}
.wo-bar-inner{margin-top:12px}
.wo-bar-row{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:6px}
.wo-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.wo-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.wo-desc{padding:0 18px 16px;font-size:13px;color:var(--t2);line-height:1.65}
.wo-tips{border-top:1px solid var(--border);padding:14px 18px;display:flex;flex-direction:column;gap:8px}
.wo-tip{font-size:13px;color:var(--t2);display:flex;gap:10px;align-items:flex-start}
.wo-tip-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px}
.wo-done-btn{display:block;width:calc(100% - 36px);margin:14px 18px;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:var(--f)}
.wo-done-btn.pending{background:var(--t1);color:#fff}
.wo-done-btn.done{background:var(--green-l);color:var(--green)}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:14px 16px}
.wd{display:flex;flex-direction:column;align-items:center;gap:5px}
.wd-lbl{font-size:10px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.05em}
.wd-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.wd.is-today .wd-dot{box-shadow:0 0 0 2px var(--t1),0 0 0 4px var(--bg)}
.wd.is-past{opacity:.38}
.wd-km{font-family:var(--fm);font-size:10px;color:var(--t3)}
.list-row{padding:12px 18px;display:flex;gap:12px;align-items:flex-start}
.list-row+.list-row{border-top:1px solid var(--border)}
.lr-left{width:48px;flex-shrink:0;text-align:right;padding-top:1px}
.lr-time{font-size:12px;color:var(--t3);font-family:var(--fm)}
.lr-body{flex:1;min-width:0}
.lr-title{font-size:13px;font-weight:500;color:var(--t1)}
.lr-sub{font-size:12px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lr-row2{display:flex;align-items:center;justify-content:space-between}
.lr-sender{font-size:13px;font-weight:600;color:var(--t1)}
.lr-ts{font-size:11px;color:var(--t3);font-family:var(--fm)}
.ni{padding:10px 18px;display:flex;align-items:center;gap:10px}
.ni+.ni{border-top:1px solid var(--border)}
.ni-icon{font-size:14px;flex-shrink:0;opacity:.7}
.ni-title{font-size:13px;color:var(--t1);text-decoration:none;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni-title:hover{color:var(--blue)}
.ni-tag{font-size:10px;color:var(--t3);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.water-wrap{padding:16px 18px}
.water-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.water-count{font-family:var(--fm);font-size:28px;font-weight:700;color:var(--blue)}
.water-goal{font-size:12px;color:var(--t3);margin-left:4px}
.water-pct{font-size:12px;color:var(--t3)}
.water-dots{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.wdot{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .18s}
.wdot.on{background:var(--blue-l);border-color:var(--blue)}
.water-btns{display:flex;gap:8px}
.w-btn{flex:1;padding:9px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--f);transition:opacity .15s}
.w-btn.p{background:var(--blue);color:#fff;border:none}
.w-btn.s{background:transparent;color:var(--t2);border:1px solid var(--border)}
.w-btn:hover{opacity:.82}
.state{padding:24px;text-align:center;font-size:13px;color:var(--t3)}
.err{padding:14px 18px;font-size:13px;color:var(--red)}
.strava-header{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.strava-meta{display:flex;gap:8px;padding:10px 18px 14px}
.st-stat{display:flex;flex-direction:column;align-items:center;flex:1}
.st-num{font-family:var(--fm);font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.5px}
.st-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-top:1px;text-align:center}
.run-row{padding:11px 18px;display:flex;align-items:center;gap:12px}
.run-row+.run-row{border-top:1px solid var(--border)}
.run-icon{width:32px;height:32px;border-radius:8px;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.run-body{flex:1;min-width:0}
.run-name{font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-chips{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.run-chip{font-size:10px;color:var(--t3);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:var(--fm)}
.fab{position:fixed;bottom:24px;right:16px;z-index:100;background:var(--t1);color:#fff;border:none;border-radius:26px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;transition:transform .15s,box-shadow .15s;font-family:var(--f)}
.fab:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.25)}
.fab-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;backdrop-filter:blur(6px)}
.overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:660px;height:85vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.12);animation:up .3s cubic-bezier(.16,1,.3,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;flex-shrink:0}
.sheet-hd{padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.coach-id{display:flex;align-items:center;gap:12px}
.coach-avatar{width:38px;height:38px;border-radius:50%;background:var(--t1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.coach-name{font-size:15px;font-weight:700}
.coach-sub{font-size:11px;color:var(--t3);margin-top:1px}
.coach-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green)}
.coach-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.close-btn{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:14px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.chat-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:82%;padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.6}
.coach-m{background:var(--surface-2);border:1px solid var(--border);color:var(--t1);border-bottom-left-radius:4px;align-self:flex-start}
.user-m{background:var(--t1);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.thinking-m{background:var(--bg);color:var(--t3);border-bottom-left-radius:4px;align-self:flex-start;font-style:italic;font-size:12px}
.quickq{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 10px;flex-shrink:0}
.qq{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:var(--f);transition:all .15s}
.qq:hover{background:var(--green-l);color:var(--green);border-color:var(--green)}
.input-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.chat-in{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;font-size:13px;color:var(--t1);outline:none;font-family:var(--f)}
.chat-in:focus{border-color:var(--t1)}
.send-btn{background:var(--t1);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);flex-shrink:0}
.send-btn:disabled{opacity:.4;cursor:default}
.tp-easy{background:#EBF2FF;color:#2952CC}.tp-tempo{background:#FEF8E8;color:#C27C1A}
.tp-intervals{background:#FDEEEE;color:#C13030}.tp-long{background:#E6F4EC;color:#1A7A4F}
.tp-race{background:#FEF1EB;color:#C44B1C}.tp-cross{background:#F1ECFE;color:#6A3FC8}.tp-rest{background:#F3F2EF;color:#737069}
.bar-easy{background:#2952CC}.bar-tempo{background:#C27C1A}.bar-intervals{background:#C13030}
.bar-long{background:#1A7A4F}.bar-race{background:#C44B1C}.bar-cross{background:#6A3FC8}.bar-rest{background:#9A9790}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-left"><div class="greeting" id="greeting">Good morning, Martin</div><div class="date-str" id="dateStr"></div></div></div>

<div class="race-card">
  <div class="race-top">
    <div><div class="race-num mono" id="raceNum">—</div><div class="race-num-label">days to race</div></div>
    <div class="race-right"><div class="race-event">🏁 Rajec 3.3 km</div><div class="race-date">June 13, 2026</div></div>
  </div>
  <div class="race-bar-wrap">
    <div class="race-bar-label"><span>Training plan</span><span id="racePct">0%</span></div>
    <div class="race-bar"><div class="race-bar-fill" id="raceBarFill"></div></div>
  </div>
  <div class="race-chips" id="raceChips"></div>
</div>

<div class="sec"><div class="sec-hd"><span class="sec-title">Today's Training</span></div><div class="card" id="woCard"><div class="state">Loading plan…</div></div></div>
<div class="sec"><div class="sec-hd"><span class="sec-title">This Week</span></div><div class="card"><div class="week-row" id="weekRow"></div></div></div>
<div class="sec"><div class="sec-hd"><span class="sec-title">Strava Runs</span><span class="badge badge-green" id="stravaBadge" style="display:none"></span></div><div class="card" id="stravaCard"><div class="state">Loading…</div></div></div>
<div class="sec"><div class="sec-hd"><span class="sec-title">Calendar</span><span class="badge badge-blue" id="calBadge" style="display:none"></span></div><div class="card" id="calCard"><div class="state">Loading…</div></div></div>
<div class="sec"><div class="sec-hd"><span class="sec-title">Inbox</span><span class="badge badge-orange" id="emailBadge" style="display:none"></span></div><div class="card" id="emailCard"><div class="state">Loading…</div></div></div>
<div class="sec"><div class="sec-hd"><span class="sec-title">Notion</span></div><div class="card" id="notionCard"><div class="state">Loading…</div></div></div>

<div class="sec"><div class="sec-hd"><span class="sec-title">Water</span></div>
  <div class="card"><div class="water-wrap">
    <div class="water-top"><div><span class="water-count" id="wNum">0</span><span class="water-goal">/ 8 glasses</span></div><span class="water-pct" id="wPct">0 %</span></div>
    <div class="water-dots" id="wDots"></div>
    <div class="water-btns"><button class="w-btn p" onclick="addWater()">+ Add glass</button><button class="w-btn s" onclick="removeWater()">Undo</button></div>
  </div></div>
</div>

<button class="fab" onclick="openCoach()"><span class="fab-dot"></span>Coach Miroslav</button>

<div class="overlay" id="coachOverlay" onclick="if(event.target===this)closeCoach()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hd">
      <div class="coach-id">
        <div class="coach-avatar">🏔️</div>
        <div><div class="coach-name">Coach Miroslav</div><div class="coach-sub">UTMB · Western States 100 · Spartathlon</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="coach-status"><div class="coach-status-dot"></div>Online</div>
        <button class="close-btn" onclick="closeCoach()">✕</button>
      </div>
    </div>
    <div class="chat-wrap" id="chatWrap"></div>
    <div class="quickq" id="quickQs">
      <button class="qq" onclick="sq(this,'What should I eat today for recovery?')">🥗 Recovery food</button>
      <button class="qq" onclick="sq(this,'What protein smoothie do you recommend?')">🥤 Protein shake</button>
      <button class="qq" onclick="sq(this,'What supplements should I take?')">💊 Supplements</button>
      <button class="qq" onclick="sq(this,'How much rest do I need this week?')">😴 Rest plan</button>
      <button class="qq" onclick="sq(this,'Race day tactics for 3.3km?')">🏁 Race tactics</button>
      <button class="qq" onclick="sq(this,'My legs feel heavy today. Should I still run?')">🦵 Heavy legs</button>
    </div>
    <div class="input-row">
      <input type="text" id="chatIn" class="chat-in" placeholder="Ask Coach Miroslav…"/>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

var TI={easy:'🏃',tempo:'⚡',intervals:'🔥',long:'🗺️',race:'🏁',cross:'🚴',rest:'🛌'};
var TB={easy:'#EBF2FF',tempo:'#FEF8E8',intervals:'#FDEEEE',long:'#E6F4EC',race:'#FEF1EB',cross:'#F1ECFE',rest:'#F3F2EF'};

function ts(){return new Date().toISOString().slice(0,10);}
function dl(){var n=new Date();n.setHours(0,0,0,0);return Math.max(0,Math.ceil((RACE-n)/864e5));}
function pp(){var tot=Math.ceil((RACE-START)/864e5),el=Math.ceil((new Date()-START)/864e5);return Math.min(100,Math.max(0,Math.round(el/tot*100)));}

function initHeader(){
  var n=new Date(),h=n.getHours();
  document.getElementById('greeting').textContent=(h<12?'Good morning':h<18?'Good afternoon':'Good evening')+', Martin';
  var D=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var M=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateStr').textContent=D[n.getDay()]+', '+n.getDate()+' '+M[n.getMonth()]+' '+n.getFullYear();
}
initHeader();

function initRace(){
  var d=dl(),p=pp();
  document.getElementById('raceNum').textContent=d>0?d:'Today!';
  document.getElementById('racePct').textContent=p+'%';
  document.getElementById('raceBarFill').style.width=p+'%';
  var today=ts(),todayW=PLAN.find(function(x){return x.d===today;});
  var weekKm=PLAN.filter(function(x){var dd=Math.ceil((new Date(x.d)-new Date(today))/864e5);return dd>=-3&&dd<=3;}).reduce(function(s,x){return s+x.km;},0);
  document.getElementById('raceChips').innerHTML=
    '<span class="race-chip">'+(todayW?TI[todayW.t]+' '+todayW.n:'Rest today')+'</span>'+
    '<span class="race-chip">'+weekKm.toFixed(1)+' km this week</span>';
}
initRace();

function weekLabel(dateStr){var wk=Math.ceil((new Date(dateStr)-START)/864e5/7);return 'Week '+wk;}
function markDone(){
  localStorage.setItem('done_'+ts(),'1');
  var b=document.getElementById('doneBtn');
  if(b){b.textContent='Completed';b.className='wo-done-btn done';}
}

function initWorkout(){
  var today=ts(),entry=null;
  for(var i=0;i<PLAN.length;i++){if(PLAN[i].d===today){entry=PLAN[i];break;}}
  var card=document.getElementById('woCard');
  if(!entry){card.innerHTML='<div class="state">No workout scheduled today</div>';return;}
  var isDone=localStorage.getItem('done_'+today)==='1';
  var totalKm=0,doneKm=0;
  for(var j=0;j<PLAN.length;j++){
    var x=PLAN[j];
    if(x.t!=='rest'&&x.t!=='cross'){totalKm+=x.km;if(x.d<today)doneKm+=x.km;}
  }
  var pct=totalKm>0?Math.round(doneKm/totalKm*100):0;
  var tipsHtml='';
  for(var k=0;k<entry.tips.length;k++)tipsHtml+='<div class="wo-tip"><div class="wo-tip-dot"></div><span>'+entry.tips[k]+'</span></div>';
  card.innerHTML=
    '<div class="wo-meta">'+
      '<div class="wo-eyebrow">'+weekLabel(entry.d)+' &middot; '+entry.d+'</div>'+
      '<div class="wo-row"><div>'+
        '<div class="wo-title">'+entry.n+'</div>'+
        '<span class="wo-pill tp-'+entry.t+'">'+TI[entry.t]+' '+entry.t+'</span>'+
      '</div>'+(entry.km>0?'<div class="wo-stats"><div class="wo-stat-num mono">'+entry.km+'</div><div class="wo-stat-lbl">km</div></div>':'')+
      '</div></div>'+
    '<div class="wo-bar-wrap"><div class="wo-bar-inner">'+
      '<div class="wo-bar-row"><span style="font-size:11px;color:var(--t3)">Plan progress</span><span class="mono" style="font-size:11px;color:var(--t3)">'+doneKm.toFixed(1)+' / '+totalKm.toFixed(1)+' km</span></div>'+
      '<div class="wo-bar"><div class="wo-bar-fill bar-'+entry.t+'" style="width:'+pct+'%"></div></div>'+
    '</div></div>'+
    '<div class="wo-desc">'+entry.desc+'</div>'+
    '<div class="wo-tips">'+tipsHtml+'</div>'+
    (entry.t!=='rest'?'<button class="wo-done-btn '+(isDone?'done':'pending')+'" id="doneBtn" onclick="markDone()">'+(isDone?'Completed':'Mark as done')+'</button>':'');
}
initWorkout();

function initWeek(){
  var n=new Date();n.setHours(0,0,0,0);
  var dow=n.getDay(),mon=new Date(n);mon.setDate(n.getDate()-((dow+6)%7));
  var DL=['M','T','W','T','F','S','S'];
  var h='',today=ts();
  for(var i=0;i<7;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    var ds=d.toISOString().slice(0,10);
    var w=null;for(var j=0;j<PLAN.length;j++){if(PLAN[j].d===ds){w=PLAN[j];break;}}
    var isT=ds===today,isP=d<n&&!isT;
    var type=w?w.t:'rest';
    var done=localStorage.getItem('done_'+ds)==='1';
    h+='<div class="wd'+(isT?' is-today':'')+(isP?' is-past':'')+'">'+
      '<div class="wd-lbl">'+DL[i]+'</div>'+
      '<div class="wd-dot" style="background:'+(TB[type]||'#f3f2ef')+';'+(done&&!isP?'outline:2px solid #1A7A4F;outline-offset:2px;':'')+'">'+TI[type]+'</div>'+
      '<div class="wd-km">'+(w&&w.km>0?w.km+'k':'')+'</div>'+
    '</div>';
  }
  document.getElementById('weekRow').innerHTML=h;
}
initWeek();

async function loadCal(){
  var card=document.getElementById('calCard');
  try{
    var n=new Date(),s=new Date(n);s.setHours(0,0,0,0);
    var e=new Date(n);e.setDate(e.getDate()+4);e.setHours(23,59,59);
    var raw=await window.cowork.callMcpTool('mcp__80bed3fe-de63-43d7-8064-56ee30e568f5__list_events',{startTime:s.toISOString(),endTime:e.toISOString(),pageSize:8,orderBy:'startTime'});
    var data=typeof raw==='string'?JSON.parse(raw):raw;

loadCal();

loadEmail();

var gW=function(){return parseInt(localStorage.getItem('w_'+ts())||'0');};
var sW=function(n){localStorage.setItem('w_'+ts(),Math.max(0,Math.min(12,n)));renderW();};
function addWater(){sW(gW()+1);}
function removeWater(){sW(gW()-1);}
function renderW(){
  var n=gW();
  document.getElementById('wNum').textContent=n;
  document.getElementById('wPct').textContent=Math.round(n/8*100)+' %';
  var h='';
  for(var i=0;i<8;i++)h+='<div class="wdot'+(i<n?' on':'')+'" onclick="sW('+(i+1)+')">💧</div>';

renderW();

var stravaData=null;
async function loadStrava(){
  var card=document.getElementById('stravaCard');
  try{
    var raw=await window.cowork.callMcpTool('mcp__workspace__web_fetch',{url:'https://morning-briefing.vercel.app/api/strava'});
    var data=typeof raw==='string'?JSON.parse(raw):raw;
    var payload=data;
    if(data&&data.content&&data.content[0]&&data.content[0].text){try{payload=JSON.parse(data.content[0].text);}catch(e){}}
    else if(typeof data==='string'){try{payload=JSON.parse(data);}catch(e){}}
    if(!payload||payload.error){
      card.innerHTML='<div class="state">Strava not connected'+(payload&&payload.needsAuth?' - check env vars':'')+'</div>';
      return;
    }
    stravaData=payload;
    var wkKm=((payload.weekKmMeters||0)/1000).toFixed(1);
    document.getElementById('stravaBadge').textContent=wkKm+' km';
    document.getElementById('stravaBadge').style.display='';
    var lr=payload.lastRun;
    var daysSince=lr?lr.daysAgo:null;
    var lastTag=daysSince===0?'Today':daysSince===1?'Yesterday':daysSince!=null?daysSince+'d ago':null;
    var h='<div class="strava-header"><span class="label">Last 30 days</span>'+(lastTag?'<span class="run-chip" style="font-size:11px;color:var(--green);background:var(--green-l);border-color:var(--green)">Last run: '+lastTag+'</span>':'')+'</div>'+
      '<div class="strava-meta">'+
        '<div class="st-stat"><div class="st-num">'+wkKm+'</div><div class="st-lbl">km/week</div></div>'+
        '<div class="st-stat"><div class="st-num">'+((payload.monthMeters||0)/1000).toFixed(1)+'</div><div class="st-lbl">km/month</div></div>'+
        '<div class="st-stat"><div class="st-num">'+(payload.runCount||0)+'</div><div class="st-lbl">runs</div></div>'+
        '<div class="st-stat"><div class="st-num">'+(payload.longestKm||0)+'</div><div class="st-lbl">longest km</div></div>'+
      '</div>';
    var recent=payload.recent||[];
    recent.forEach(function(run){
      var km=((run.distance||0)/1000).toFixed(2);
      var m=Math.floor((run.movingTime||0)/60),s=(run.movingTime||0)%60;
      var timeStr=run.movingTime?(m+':'+String(s).padStart(2,'0')):'';
      var pacePs=run.averagePace?Math.round(run.averagePace):0;
      var paceStr=pacePs?(Math.floor(pacePs/60)+':'+String(pacePs%60).padStart(2,'0')+'/km'):'';
      var hrStr=run.averageHr?('♥ '+Math.round(run.averageHr)+' bpm'):'';
      var dateStr=run.date?run.date.slice(0,10):'';
      h+='<div class="run-row"><div class="run-icon">🏃</div><div class="run-body">'+
        '<div class="run-name">'+(run.name||'Run')+'</div>'+
        '<div class="run-chips">'+
          '<span class="run-chip">'+km+' km</span>'+
          (timeStr?'<span class="run-chip">'+timeStr+'</span>':'')+
          (paceStr?'<span class="run-chip">'+paceStr+'</span>':'')+
          (hrStr?'<span class="run-chip">'+hrStr+'</span>':'')+
          (dateStr?'<span class="run-chip">'+dateStr+'</span>':'')+
        '</div></div></div>';
    });
    card.innerHTML=h;
  }catch(err){
    console.error('Strava error:',err);
    card.innerHTML='<div class="err">Failed to load Strava: '+String(err).slice(0,60)+'</div>';
  }
}
loadStrava();

var busy=false;
function coachCtx(){
  var today=ts(),d=dl();
  var entry=null;for(var i=0;i<PLAN.length;i++){if(PLAN[i].d===today){entry=PLAN[i];break;}}
  var nxt='';
  var upcoming=PLAN.filter(function(p){var dd=Math.ceil((new Date(p.d)-new Date(today))/864e5);return dd>=0&&dd<=7;});
  for(var j=0;j<upcoming.length;j++){nxt+=upcoming[j].d+': '+upcoming[j].n+(upcoming[j].km>0?' '+upcoming[j].km+'km':'')+' | ';}
  var stravaCtx='';
  if(stravaData){
    var wk=((stravaData.weekKmMeters||0)/1000).toFixed(1);
    var mo=((stravaData.monthMeters||0)/1000).toFixed(1);
    var lr=stravaData.lastRun;
    stravaCtx='\nSTRAVA: '+wk+'km this week, '+mo+'km/month, '+stravaData.runCount+' runs. Last run: '+(lr?((lr.distance/1000).toFixed(1)+'km, '+lr.daysAgo+'d ago'):'unknown')+'.';
  }
  return 'You are Coach Miroslav - elite ultramarathon runner (UTMB, Western States 100, Spartathlon). Martin\'s personal coach.\n'+
    'GOAL: 3.3km race, Rajec Slovakia, June 13 2026, '+d+' days away.\n'+
    'PHILOSOPHY: Health is #1. No injuries. Smart beats hard.\n'+
    'TODAY ('+today+'): '+(entry?entry.n+' - '+entry.desc:'Rest day')+'\n'+
    'NEXT 7 DAYS: '+nxt+
    stravaCtx+'\n'+
    'SUPPLEMENTS: magnesium glycinate 300mg evening, D3 2000IU morning, omega-3 2g with food, collagen 10g post-run with vitamin C.\n'+
    'SMOOTHIE: 1 banana + 25g whey + 200ml oat milk + 1 tbsp almond butter + ice = ~35g protein.\n'+
    'RECOVERY: foam roll 5min, cold water leg soak 10min, 2.5L water/day, sleep 7-8h.\n'+
    'ANY real pain = rest + doctor. Never push through pain.\n'+
    'RACE STRATEGY: controlled first 400m, build through km 1-2.7, empty tank final 600m.\n'+
    'Reply concisely (max 3 sentences) unless detail is requested. Be warm and motivating.';
}

function openCoach(){
  document.getElementById('coachOverlay').classList.add('open');
  if(!document.getElementById('chatWrap').children.length){
    var d=dl();
    var entry=null;for(var i=0;i<PLAN.length;i++){if(PLAN[i].d===ts()){entry=PLAN[i];break;}}
    addBubble('coach','Zdravo Martin! Coach Miroslav here.\n\n'+d+' day'+(d!==1?'s':'')+' to Rajec. '+(entry?'Today: '+entry.n+(entry.km>0?' - '+entry.km+' km':'')+'.\n\n':'')+'Ask me anything - training, food, recovery, supplements, race tactics. Lets get you to that start line sharp and healthy!');
  }
  setTimeout(function(){document.getElementById('chatIn').focus();},300);
}
function closeCoach(){document.getElementById('coachOverlay').classList.remove('open');}

function addBubble(who,text){
  var wrap=document.getElementById('chatWrap');
  var div=document.createElement('div');
  div.className='msg '+who+'-m';
  div.innerHTML=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}
function addThink(){
  var w=document.getElementById('chatWrap'),d=document.createElement('div');
  d.id='thmsg';d.className='msg thinking-m';d.textContent='Thinking...';
  w.appendChild(d);w.scrollTop=w.scrollHeight;
}
function rmThink(){var e=document.getElementById('thmsg');if(e)e.remove();}

async function sendMsg(){
  if(busy)return;
  var inp=document.getElementById('chatIn'),txt=inp.value.trim();
  if(!txt)return;inp.value='';
  await chat(txt);
}
async function sq(btn,txt){
  if(busy)return;
  btn.closest('.quickq').style.display='none';
  await chat(txt);
}
async function chat(txt){
  busy=true;
  document.getElementById('sendBtn').disabled=true;
  addBubble('user',txt);
  addThink();
  try{
    if(!window.cowork||!window.cowork.askClaude)throw new Error('askClaude not available');
    var r=await window.cowork.askClaude(coachCtx()+'\n\nMartin: '+txt+'\n\nCoach Miroslav:',[]);
    rmThink();
    addBubble('coach',typeof r==='string'?r:JSON.stringify(r));
  }catch(err){
    console.error('Coach error:',err);
    rmThink();
    var m=err&&err.message?err.message:String(err);
    addBubble('coach',m.includes('askClaude not available')?'Open this in Cowork to chat with me. 🏔️':'Error: '+m.slice(0,80)+' - try again?');
  }finally{
    busy=false;
    document.getElementById('sendBtn').disabled=false;
    document.getElementById('chatIn').focus();
  }
}
document.getElementById('chatIn').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeCoach();});
</script>
