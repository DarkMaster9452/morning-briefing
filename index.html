<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morning Briefing · Martin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>"/>
  <style>
    :root {
      --bg:#0d1117; --surface:#161b25; --surface2:#1e2436; --border:#252d45;
      --accent:#6c63ff; --accent2:#ff6584; --green:#43d9ad; --yellow:#ffd166;
      --spotify:#1db954; --text:#dde4f0; --muted:#7a85a0; --red:#ff5555;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:12px}

    /* ── TOP BAR ── */
    #topbar{
      display:flex;align-items:center;gap:12px;
      padding:0 14px;height:52px;
      background:var(--surface);border-bottom:1px solid var(--border);
      flex-shrink:0;position:relative;
    }
    #topbar .greeting{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
    #topbar .spacer{flex:1}
    #topbar .topbar-center{
      position:absolute;left:50%;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;gap:1px;
    }
    #topbar .clock{font-size:28px;font-weight:200;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:.04em;line-height:1}
    #topbar .date{font-size:10px;color:var(--muted);letter-spacing:.04em}
    .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
    .live-label{font-size:10px;color:var(--muted);display:flex;align-items:center}
    #lastUp{font-size:10px;color:var(--muted)}
    .rbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;transition:.15s}
    .rbtn:hover{border-color:var(--accent);color:var(--accent)}

    /* ── MAIN 3-COL GRID ── */
    #main{
      display:grid;
      grid-template-columns:1fr 1fr 1.1fr;
      grid-template-rows:1fr;
      gap:8px;
      padding:8px;
      height:calc(100vh - 48px);
      overflow:hidden;
    }

    /* ── COLUMNS ── */
    .col{display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0}

    /* ── CARDS ── */
    .card{
      background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:10px 12px;display:flex;flex-direction:column;overflow:hidden;
      transition:border-color .2s;min-height:0;flex-shrink:0;
    }
    .card:hover{border-color:rgba(108,99,255,.3)}
    .card.grow{flex:1;min-height:0}  /* fills remaining space in column */
    .card-header{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-shrink:0}
    .card-icon{font-size:14px;line-height:1}
    .card-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .badge{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:12px;font-size:9px;font-weight:700;color:var(--muted);padding:1px 7px}
    .badge.green{background:rgba(67,217,173,.1);border-color:var(--green);color:var(--green)}
    .badge.red{background:rgba(255,101,132,.1);border-color:var(--accent2);color:var(--accent2)}
    .card-body{flex:1;overflow-y:auto;min-height:0}
    .card-body::-webkit-scrollbar{width:3px}
    .card-body::-webkit-scrollbar-track{background:transparent}
    .card-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* ── LOADING / ERROR ── */
    .loading{color:var(--muted);text-align:center;padding:14px 0;opacity:.5;font-size:11px}
    .err{font-size:11px;color:var(--accent2);background:rgba(255,101,132,.06);border:1px solid rgba(255,101,132,.2);border-radius:6px;padding:8px 10px;text-align:center}
    .cbtn{display:inline-block;margin-top:6px;padding:4px 12px;border-radius:10px;font-size:10px;font-weight:600;text-decoration:none;color:#fff}
    .cbtn.google{background:#4285f4}
    .cbtn.spotify{background:var(--spotify)}
    .cbtn.notion{background:#fff;color:#000}

    /* ── WEATHER ── */
    .w-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .w-icon{font-size:36px;line-height:1}
    .w-temp{font-size:36px;font-weight:200;line-height:1}
    .w-temp sup{font-size:14px;vertical-align:super}
    .w-info{display:flex;flex-direction:column;gap:2px}
    .w-desc{font-size:11px;color:var(--text);font-weight:500}
    .w-detail{font-size:10px;color:var(--muted)}
    .forecast{display:flex;gap:6px;margin-top:6px}
    .fc{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 8px;text-align:center;flex:1}
    .fc-name{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.05em}
    .fc-ico{font-size:16px;margin:2px 0}
    .fc-t .hi{font-weight:600;font-size:11px}
    .fc-t .lo{color:var(--muted);font-size:10px}

    /* ── WORLD CLOCKS ── */
    .clocks{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
    .tz{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 8px}
    .tz-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:2px}
    .tz-t{font-size:14px;font-weight:300;font-variant-numeric:tabular-nums}
    .tz-d{font-size:9px;color:var(--muted)}

    /* ── GMAIL ── */
    .email{padding:5px 0;border-bottom:1px solid var(--border)}
    .email:last-child{border-bottom:none}
    .email-from{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .email-sub{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .email-snip{font-size:10px;color:var(--muted);opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── CALENDAR ── */
    .event{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border)}
    .event:last-child{border-bottom:none}
    .evt-time{font-size:10px;font-weight:700;color:var(--accent);min-width:36px;padding-top:1px;flex-shrink:0}
    .evt-title{font-size:11px;font-weight:500;line-height:1.3}
    .evt-meta{font-size:9px;color:var(--muted)}
    .allday{font-size:9px;color:var(--yellow);background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.25);border-radius:3px;padding:0 4px}

    /* ── SPOTIFY ── */
    .sp-row{display:flex;gap:10px;align-items:center}
    .sp-art{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0}
    .sp-ph{width:48px;height:48px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .sp-track{font-size:12px;font-weight:600;line-height:1.3}
    .sp-track a{color:var(--text);text-decoration:none}
    .sp-track a:hover{color:var(--spotify)}
    .sp-artist{font-size:10px;color:var(--muted)}
    .sp-album{font-size:9px;color:var(--muted);opacity:.7}
    .prog{height:2px;background:var(--border);border-radius:1px;margin-top:7px}
    .prog-fill{height:100%;background:var(--spotify);border-radius:1px;transition:width 1s linear}
    .sp-status{font-size:9px;font-weight:700;color:var(--spotify);margin-bottom:5px;letter-spacing:.04em}
    .sp-recent-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:8px 0 4px}
    .sp-rec{display:flex;gap:8px;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)}
    .sp-rec:last-child{border-bottom:none}
    .sp-rec-art{width:28px;height:28px;border-radius:4px;object-fit:cover;flex-shrink:0}
    .sp-rec-name{font-size:10px;font-weight:500}
    .sp-rec-art-name{font-size:9px;color:var(--muted)}

    /* ── NOTION ── */
    .notion-sec-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:3px 0 4px;border-bottom:1px solid var(--border);margin-bottom:2px}
    .notion-item{display:flex;gap:7px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
    .notion-item:last-child{border-bottom:none}
    .notion-icon{font-size:12px;flex-shrink:0;width:16px;text-align:center}
    .notion-title{font-size:11px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .notion-title a{color:var(--text);text-decoration:none}
    .notion-title a:hover{color:var(--accent)}
    .notion-age{font-size:9px;color:var(--muted);flex-shrink:0}

    /* ── VERCEL ── */
    .vp{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border)}
    .vp:last-child{border-bottom:none}
    .vp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .vp-dot.ready{background:var(--green)}
    .vp-dot.building{background:var(--yellow);animation:pulse 1s infinite}
    .vp-dot.error{background:var(--red)}
    .vp-dot.unknown{background:var(--muted)}
    .vp-name{font-size:11px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .vp-name a{color:var(--text);text-decoration:none}
    .vp-name a:hover{color:var(--accent)}
    .vp-state{font-size:9px;color:var(--muted);flex-shrink:0}

    /* ── NEWS TABS ── */
    .tabs{display:flex;gap:1px;margin-bottom:8px;background:var(--surface2);border-radius:7px;padding:2px;flex-shrink:0}
    .tab{flex:1;text-align:center;padding:4px 6px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;color:var(--muted);transition:.15s;border:none;background:none}
    .tab.active{background:var(--accent);color:#fff}
    .news-panel{display:none}
    .news-panel.active{display:block}
    .ni{padding:6px 0;border-bottom:1px solid var(--border)}
    .ni:last-child{border-bottom:none}
    .ni-head{font-size:11px;font-weight:500;line-height:1.35;margin-bottom:2px}
    .ni-head a{color:var(--text);text-decoration:none}
    .ni-head a:hover{color:var(--accent)}
    .ni-desc{font-size:10px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .ni-meta{font-size:9px;color:var(--accent);margin-top:2px}

    /* ── OK STATES ── */
    .ok{color:var(--green);font-size:11px;padding:6px 0}
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="greeting">Good morning, Martin 👋</div>
  <div class="spacer"></div>
  <div class="topbar-center">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="dateStr">Loading...</div>
  </div>
  <div class="spacer"></div>
  <span id="lastUp">–</span>
  <div class="live-label"><span class="dot"></span>Live</div>
  <button class="rbtn" onclick="refreshAll()">↻</button>
</div>

<!-- MAIN 3-COLUMN LAYOUT -->
<div id="main">

  <!-- COL 1: Weather + Clocks + Gmail -->
  <div class="col">

    <div class="card">
      <div class="card-header">
        <span class="card-icon">🌤️</span>
        <span class="card-title">Weather — Rajec</span>
        <span class="badge" id="w-badge">–</span>
      </div>
      <div id="w-body"><div class="loading">Loading...</div></div>
    </div>

    <div class="card grow">
      <div class="card-header">
        <span class="card-icon">📧</span>
        <span class="card-title">Gmail</span>
        <span class="badge" id="gmail-badge">–</span>
      </div>
      <div class="card-body" id="gmail-body"><div class="loading">Loading...</div></div>
    </div>

  </div>

  <!-- COL 2: Calendar + Spotify + Vercel + Notion -->
  <div class="col">

    <div class="card">
      <div class="card-header">
        <span class="card-icon">📅</span>
        <span class="card-title">Today's Schedule</span>
        <span class="badge" id="cal-badge">–</span>
      </div>
      <div class="card-body" id="cal-body" style="max-height:140px"><div class="loading">Loading...</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-icon">🎵</span>
        <span class="card-title">Spotify</span>
        <span class="badge" id="sp-badge">–</span>
      </div>
      <div id="sp-body"><div class="loading">Loading...</div></div>
    </div>

    <div class="card" style="flex-shrink:0">
      <div class="card-header">
        <span class="card-icon">▲</span>
        <span class="card-title">Vercel Projects</span>
        <span class="badge" id="vp-badge">–</span>
      </div>
      <div id="vp-body"><div class="loading">Loading...</div></div>
    </div>

    <div class="card grow">
      <div class="card-header">
        <span class="card-icon">◻</span>
        <span class="card-title">Notion</span>
        <span class="badge" id="notion-badge">–</span>
      </div>
      <div class="card-body">
        <div class="notion-sec-label">✅ Tasky</div>
        <div id="notion-tasks"><div class="loading">Loading...</div></div>
        <div class="notion-sec-label" style="margin-top:10px">📂 Projekty</div>
        <div id="notion-projects"><div class="loading">Loading...</div></div>
      </div>
    </div>

  </div>

  <!-- COL 3: Split News — World (top) + AI/Tech tabbed (bottom) -->
  <div class="col">

    <div class="card grow">
      <div class="card-header">
        <span class="card-icon">🌍</span>
        <span class="card-title">World</span>
        <span class="badge" id="news-world-badge">–</span>
      </div>
      <div class="card-body">
        <div id="panel-world"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <div class="card grow">
      <div class="card-header">
        <span class="card-icon">🤖</span>
        <span class="card-title">AI & Tech</span>
        <span class="badge" id="news-badge">–</span>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('ai',this)">🤖 AI</button>
        <button class="tab" onclick="switchTab('tech',this)">💻 Tech</button>
      </div>
      <div class="card-body">
        <div class="news-panel active" id="panel-ai"><div class="loading">Loading...</div></div>
        <div class="news-panel" id="panel-tech"><div class="loading">Loading...</div></div>
      </div>
    </div>

  </div>

</div>

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const p=n=>String(n).padStart(2,'0');

// ── CLOCK ────────────────────────────────────────────────────────────────────
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('dateStr').textContent=`${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
}
setInterval(tick,1000); tick();

// ── WEATHER ──────────────────────────────────────────────────────────────────
async function fetchWeather(){
  try{
    const d=await fetch('/api/weather').then(r=>r.json());
    if(d.error)throw new Error(d.error);
    document.getElementById('w-badge').textContent=`${d.temp}°C`;
    const fc=(d.forecast||[]).map(f=>
      `<div class="fc"><div class="fc-name">${f.name}</div><div class="fc-ico">${f.icon}</div><div class="fc-t"><span class="hi">${f.hi}°</span> <span class="lo">${f.lo}°</span></div></div>`
    ).join('');
    document.getElementById('w-body').innerHTML=`
      <div class="w-row">
        <div class="w-icon">${d.icon}</div>
        <div class="w-temp">${d.temp}<sup>°C</sup></div>
        <div class="w-info">
          <div class="w-desc">${d.desc}</div>
          <div class="w-detail">Feels ${d.feels_like}° · 💧${d.humidity}% · 💨${d.wind}km/h</div>
        </div>
      </div>
      <div class="forecast">${fc}</div>`;
  }catch(e){document.getElementById('w-body').innerHTML=`<div class="err">⚠️ Weather unavailable<br><span style="font-size:9px;color:var(--muted)">${e.message}</span></div>`}
}

// ── GMAIL ────────────────────────────────────────────────────────────────────
async function fetchGmail(){
  try{
    const d=await fetch('/api/gmail').then(r=>r.json());
    if(d.needsAuth){document.getElementById('gmail-badge').textContent='–';document.getElementById('gmail-body').innerHTML=`<div class="err">Not connected<br><a href="/api/auth/google-redirect" class="cbtn google">Connect Google</a></div>`;return}
    const{emails=[],total=0}=d;
    document.getElementById('gmail-badge').textContent=`${total} unread`;
    if(!emails.length){document.getElementById('gmail-body').innerHTML=`<div class="ok">✅ Inbox zero</div>`;return}
    document.getElementById('gmail-body').innerHTML=emails.map(e=>{
      const from=e.from.replace(/"([^"]+)"\s*<[^>]+>/,'$1').replace(/<[^>]+>/,'').trim();
      return `<div class="email"><div class="email-from">${from}</div><div class="email-sub">${e.subject}</div><div class="email-snip">${e.snippet}</div></div>`;
    }).join('');
  }catch(e){document.getElementById('gmail-body').innerHTML=`<div class="err">⚠️ ${e.message}</div>`}
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
async function fetchCalendar(){
  try{
    const d=await fetch('/api/calendar').then(r=>r.json());
    if(d.needsAuth){document.getElementById('cal-badge').textContent='–';document.getElementById('cal-body').innerHTML=`<div class="err">Not connected<br><a href="/api/auth/google-redirect" class="cbtn google">Connect Google</a></div>`;return}
    const{events=[]}=d;
    document.getElementById('cal-badge').textContent=`${events.length} events`;
    if(!events.length){document.getElementById('cal-body').innerHTML=`<div class="ok">✅ Free today</div>`;return}
    document.getElementById('cal-body').innerHTML=events.map(ev=>{
      const time=ev.allDay?`<span class="allday">all day</span>`:(()=>{const s=new Date(ev.start);return`${p(s.getHours())}:${p(s.getMinutes())}`})();
      const meta=[ev.location?`📍 ${ev.location.slice(0,24)}`:'',ev.attendees>1?`👥${ev.attendees}`:''].filter(Boolean).join(' ');
      return `<div class="event"><div class="evt-time">${time}</div><div><div class="evt-title">${ev.title}</div>${meta?`<div class="evt-meta">${meta}</div>`:''}</div></div>`;
    }).join('');
  }catch(e){document.getElementById('cal-body').innerHTML=`<div class="err">⚠️ ${e.message}</div>`}
}

// ── SPOTIFY ──────────────────────────────────────────────────────────────────
var spProgressInterval = null; // var avoids any TDZ issues

async function fetchSpotify(){
  try{
    // Clear any running progress ticker
    if(spProgressInterval){clearInterval(spProgressInterval);spProgressInterval=null;}

    const d=await fetch('/api/spotify').then(r=>r.json());
    if(d.needsAuth){
      document.getElementById('sp-badge').textContent='–';
      document.getElementById('sp-body').innerHTML=`<div class="err">Not connected<br><a href="/api/auth/spotify-redirect" class="cbtn spotify">Connect Spotify</a></div>`;
      return;
    }
    if(d.playing&&d.track){
      const t=d.track;
      const dur=t.duration||d.duration||0;
      const prog=d.progress||0;
      const pct=dur?Math.round(prog/dur*100):0;
      document.getElementById('sp-badge').className='badge green';
      document.getElementById('sp-badge').textContent='▶ Live';
      document.getElementById('sp-body').innerHTML=`
        <div class="sp-status">▶ NOW PLAYING</div>
        <div class="sp-row">
          ${t.image?`<img class="sp-art" src="${t.image}" alt="">`:`<div class="sp-ph">🎵</div>`}
          <div>
            <div class="sp-track"><a href="${t.url||'#'}" target="_blank">${t.name}</a></div>
            <div class="sp-artist">${t.artist}</div>
            <div class="sp-album">${t.album}</div>
          </div>
        </div>
        <div class="prog"><div class="prog-fill" id="spf" style="width:${pct}%"></div></div>`;
      var pr=prog;
      spProgressInterval=setInterval(function(){
        pr+=1000;
        var el=document.getElementById('spf');
        if(el&&dur)el.style.width=Math.min(100,Math.round(pr/dur*100))+'%';
        else if(!el){clearInterval(spProgressInterval);spProgressInterval=null;}
      },1000);
    }else{
      document.getElementById('sp-badge').textContent='⏸';
      var rec=d.recent||[];
      document.getElementById('sp-body').innerHTML=
        `<div class="sp-status" style="color:var(--muted)">⏸ Nič nehrá</div>`+
        (rec.length
          ?`<div class="sp-recent-label">Naposledy</div>`+rec.map(function(t){
              return`<div class="sp-rec">`+
                (t.image?`<img class="sp-rec-art" src="${t.image}">`:`<div style="width:28px;height:28px;background:var(--surface2);border-radius:4px;flex-shrink:0"></div>`)+
                `<div><div class="sp-rec-name">${t.name}</div><div class="sp-rec-art-name">${t.artist}</div></div></div>`;
            }).join('')
          :'');
    }
  }catch(e){
    document.getElementById('sp-body').innerHTML=`<div class="err">⚠️ Spotify nedostupný<br><span style="font-size:9px;opacity:.6">${e.message}</span></div>`;
  }
}

// ── VERCEL PROJECTS ───────────────────────────────────────────────────────────
function stateColor(s){return{READY:'ready',BUILDING:'building',ERROR:'error'}[s]||'unknown'}
function ago(ms){if(!ms)return'';const d=Math.floor((Date.now()-ms)/60000);return d<60?`${d}m`:d<1440?`${Math.floor(d/60)}h`:`${Math.floor(d/1440)}d`}

async function fetchVercel(){
  try{
    const d=await fetch('/api/vercel-projects').then(r=>r.json());
    if(d.needsAuth){document.getElementById('vp-badge').textContent='–';document.getElementById('vp-body').innerHTML=`<div class="err">Add VERCEL_TOKEN + VERCEL_TEAM_ID to env vars</div>`;return}
    const{projects=[]}=d;
    document.getElementById('vp-badge').textContent=`${projects.length}`;
    document.getElementById('vp-body').innerHTML=projects.map(p=>`
      <div class="vp">
        <div class="vp-dot ${stateColor(p.state)}"></div>
        <div class="vp-name">${p.url?`<a href="${p.url}" target="_blank">${p.name}</a>`:p.name}</div>
        <div class="vp-state">${p.state==='READY'?'✓':p.state} ${ago(p.age)}</div>
      </div>`).join('');
  }catch(e){document.getElementById('vp-body').innerHTML=`<div class="err">⚠️ ${e.message}</div>`}
}

// ── NOTION ───────────────────────────────────────────────────────────────────
function notionAgo(iso){if(!iso)return'';const d=Math.floor((Date.now()-new Date(iso))/60000);return d<60?`${d}m`:d<1440?`${Math.floor(d/60)}h`:`${Math.floor(d/1440)}d ago`}

function renderNotionItems(items){
  if(!items.length)return'<div style="font-size:10px;color:var(--muted);padding:3px 0;font-style:italic">–</div>';
  return items.map(p=>`
    <div class="notion-item">
      <div class="notion-icon">${p.icon||'◻'}</div>
      <div class="notion-title"><a href="${p.url}" target="_blank">${p.title}</a></div>
      <div class="notion-age">${notionAgo(p.edited)}</div>
    </div>`).join('');
}

async function fetchNotion(){
  try{
    const d=await fetch('/api/notion').then(r=>r.json());
    const authErr=`<div class="err">Add NOTION_TOKEN to env vars<br><a href="https://notion.so/my-integrations" target="_blank" class="cbtn notion">Get token</a></div>`;
    if(d.needsAuth){
      document.getElementById('notion-badge').textContent='–';
      document.getElementById('notion-tasks').innerHTML=authErr;
      document.getElementById('notion-projects').innerHTML='';
      return;
    }
    const{pages=[]}=d;
    document.getElementById('notion-badge').textContent=`${pages.length}`;
    // database children = tasks, top-level pages = projects
    const tasks=pages.filter(p=>p.type==='db');
    const projects=pages.filter(p=>p.type!=='db');
    document.getElementById('notion-tasks').innerHTML=renderNotionItems(tasks);
    document.getElementById('notion-projects').innerHTML=renderNotionItems(projects);
  }catch(e){
    document.getElementById('notion-tasks').innerHTML=`<div class="err">⚠️ ${e.message}</div>`;
    document.getElementById('notion-projects').innerHTML='';
  }
}

// ── NEWS TABS ────────────────────────────────────────────────────────────────
function timeSince(str){try{const d=Math.floor((Date.now()-new Date(str))/60000);return d<60?`${d}m ago`:d<1440?`${Math.floor(d/60)}h ago`:new Date(str).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}catch{return''}}

async function fetchNews(type,src){
  try{
    const{items=[]}=await fetch(`/api/news?type=${type}`).then(r=>r.json());
    document.getElementById(`panel-${type}`).innerHTML=items.map(it=>`
      <div class="ni">
        <div class="ni-head"><a href="${it.link}" target="_blank" rel="noopener">${it.title}</a></div>
        ${it.desc?`<div class="ni-desc">${it.desc}</div>`:''}
        <div class="ni-meta">${src} · ${timeSince(it.pub)}</div>
      </div>`).join('');
    return items.length;
  }catch{document.getElementById(`panel-${type}`).innerHTML=`<div class="err">⚠️ Could not load</div>`;return 0}
}

function switchTab(type,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.news-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${type}`).classList.add('active');
}

// ── REFRESH ALL ──────────────────────────────────────────────────────────────
async function refreshAll(){
  document.getElementById('lastUp').textContent='Refreshing…';
  await Promise.all([
    fetchWeather(),fetchGmail(),fetchCalendar(),fetchSpotify(),fetchVercel(),fetchNotion(),
    fetchNews('world','BBC').then(n=>{ const b=document.getElementById('news-world-badge'); if(b)b.textContent=n+' článkov'; }),
    fetchNews('ai','TechCrunch'),
    fetchNews('tech','Ars Technica'),
  ]);
  const n=new Date();
  document.getElementById('lastUp').textContent=`${p(n.getHours())}:${p(n.getMinutes())}`;
  document.getElementById('news-badge').textContent='Live';
}

setInterval(refreshAll,5*60*1000);
setInterval(fetchSpotify,30*1000); // keep Spotify fresh
refreshAll();
</script>
